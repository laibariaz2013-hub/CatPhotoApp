<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8"/>
    <meta content="width=device-width, initial-scale=1.0" />
    <title>Cat Photo App</title>
  </head>
  <body>
    <h1>CatPhotoApp</h1>
    <h2>Cat Photos</h2>
    <p>Everyone loves <a href="https://cdn.freecodecamp.org/curriculum/cat-photo-app/running-cats.jpg">Cute Cats</a> online!</p>
    <p>See more cat photos in <a href="https://www.freecatphotoapp.com/">our gallery</a>.</p>
    <a href="https://www.freecatphotoapp.com/">
    <img src="https://cdn.freecodecamp.org/curriculum/cat-photo-app/relaxing-cat.jpg" alt="A cute tabby cat lying on its back"/>
    </a>
      <h2>Cat Lists</h2>
    <h3>Things cats love:</h3>
    <li>
      <ul>catnips</ul>
      <ul>laser pointers</ul>
      <ul>lasagna</ul>
    </li>
      <figure>
      <img src="https://cdn.freecodecamp.org/curriculum/cat-photo-app/lasagna.jpg">
        <br>
        <figcapton>Cats <i>LOVE</i> Lasagna</figcapton>
      </figure>
      <h3>Things cats hate:</h3>
      <li>
        <ol>flea treatments</ol>
        <ol>thunder</ol>
        <ol>other cats</ol>
      </li>
        <figure>
          <img src="https://cdn.freecodecamp.org/curriculum/cat-photo-app/cats.jpg">
          <br>
      <figcaption>Cats <b>HATE</b> other cats</figcaption>
        </figure>
    <footer>
    <p>No Copyright - <a href="freecodecamp.org">FreeCodeCamp.org</a></p>
    </footer>
  </body>
</html>
